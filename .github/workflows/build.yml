name: "Build"

on:
  workflow_dispatch:
  schedule:
    - cron: "0 0 * * 0"
  push:
    branches:
      - 'main'
    paths:
      - "build-*.sh"
      - ".github/workflows/*.yml"
      - "wslconf/*"

permissions:
  contents: write  

jobs:
  build-amd64:
    runs-on: ubuntu-latest
    outputs:
      RELEASE: ${{ steps.start_build.outputs.RELEASE }}
      RELEASE_EDGE: ${{ steps.start_build.outputs.RELEASE_EDGE }}
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - id: start_build
        run: |
          bash build-stable.sh
          bash build-edge.sh
      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: amd64
          path: ./*.wsl

  build-arm64:
    runs-on: ubuntu-24.04-arm
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - id: start_build
        run: |
          bash build-stable.sh
          bash build-edge.sh
      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: arm64
          path: ./*.wsl

  release:
    runs-on: ubuntu-latest
    needs: [build-amd64, build-arm64]
    steps:
      - name: Download artifact
        uses: actions/download-artifact@v8
        with:
         merge-multiple: true

      - name: Release stable
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ needs.build-amd64.outputs.RELEASE }}
          name: Stable ${{ needs.build-amd64.outputs.RELEASE }}
          files: |
            alpine-stable-x86_64.wsl
            alpine-stable-aarch64.wsl
          preserve_order: true
          make_latest: true

      - name: Release edge
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ needs.build-amd64.outputs.RELEASE_EDGE }}
          name: Edge ${{ needs.build-amd64.outputs.RELEASE_EDGE }}
          files: |
            alpine-edge-x86_64.wsl
            alpine-edge-aarch64.wsl
          preserve_order: true
          make_latest: false

env:
  GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
